openapi: 3.0.3
info:
  title: HP Project Backend API
  version: 0.1.0
  description: |
    REST API for "Trapped in Harry Potter: Rewrite the Fate" — Android demo.

    Two player-facing surfaces:
    1. **Storyline** (DLC scene loop) — `/dlcs`, `/playthroughs/...`, `/decisions`, `/ending`
    2. **Hermione's Notes** (separate RAG-only Q&A) — `/hermione/query`

    All player-facing strings in this API are **English**. Player identity is a
    client-generated UUID stored in Android `SharedPreferences`; no auth.

servers:
  - url: http://localhost:8000/api/v1
    description: Local FastAPI dev server
  - url: https://{ngrok_subdomain}.ngrok-free.app/api/v1
    description: ngrok tunnel (for demo on physical device)
    variables:
      ngrok_subdomain:
        default: "your-tunnel"

tags:
  - name: DLC
    description: DLC catalog
  - name: Playthrough
    description: Storyline scene loop
  - name: Hermione
    description: Hermione's Notes RAG-only module

paths:
  /dlcs:
    get:
      summary: List available DLCs
      operationId: listDLCs
      tags: [DLC]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDLCsResponse"

  /playthroughs:
    post:
      summary: Start a new playthrough or resume an existing in-progress one
      description: |
        If the player already has an `IN_PROGRESS` playthrough for the given
        DLC, that playthrough is returned (resumption). Otherwise a new
        playthrough is created. The first scene is included in the response
        either way.
      operationId: startPlaythrough
      tags: [Playthrough]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartPlaythroughRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPlaythroughResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Unknown `dlc_id`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /playthroughs/{playthrough_id}/scene:
    get:
      summary: Get the current scene + state of a playthrough
      operationId: getCurrentScene
      tags: [Playthrough]
      parameters:
        - $ref: "#/components/parameters/PlaythroughId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSceneResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            The playthrough has already reached the ending. Use
            `GET /playthroughs/{id}/ending` instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /playthroughs/{playthrough_id}/decisions:
    post:
      summary: Submit a decision for the current scene
      description: |
        The body's `mode` field discriminates between CHOICE and FREE_TEXT
        payloads. The `scene_id` must match the playthrough's current scene.
      operationId: submitDecision
      tags: [Playthrough]
      parameters:
        - $ref: "#/components/parameters/PlaythroughId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDecisionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            `scene_id` does not match the playthrough's current scene, or the
            playthrough has already reached the ending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /playthroughs/{playthrough_id}/ending:
    get:
      summary: Get the ending of a completed playthrough
      operationId: getEnding
      tags: [Playthrough]
      parameters:
        - $ref: "#/components/parameters/PlaythroughId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEndingResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The playthrough has not reached the ending yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hermione/query:
    post:
      summary: Ask Hermione's Notes a question
      description: |
        RAG-backed knowledge query. Does not advance scene state, mutate score,
        or branch the storyline. Hints will not directly reveal the correct
        decision (FR 1.6).
      operationId: hermioneQuery
      tags: [Hermione]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HermioneQueryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HermioneQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  parameters:
    PlaythroughId:
      name: playthrough_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ----- Enums -----
    DecisionMode:
      type: string
      enum: [CHOICE, FREE_TEXT]
      description: Which mode the player actually used.
    PlaythroughStatus:
      type: string
      enum: [IN_PROGRESS, COMPLETED]
    EndingId:
      type: string
      enum: [SUCCESS, FAIL]

    # ----- Scene -----
    ChoiceOption:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
          example: "B"
        text:
          type: string
          example: "Use the two-way mirror Sirius gave you at Christmas."
    ChoiceConfig:
      type: object
      required: [options]
      properties:
        options:
          type: array
          items:
            $ref: "#/components/schemas/ChoiceOption"
    FreeTextConfig:
      type: object
      required: [prompt, max_chars]
      properties:
        prompt:
          type: string
          example: "What is your plan?"
        max_chars:
          type: integer
          minimum: 1
          example: 240
    # SceneDecision is a discriminated union. The `mode` field selects exactly
    # one of three concrete shapes — preventing valid-but-broken payloads
    # like {mode: "EITHER"} with both `choice` and `free_text` absent.
    SceneDecision:
      oneOf:
        - $ref: "#/components/schemas/ChoiceOnlyDecision"
        - $ref: "#/components/schemas/FreeTextOnlyDecision"
        - $ref: "#/components/schemas/EitherDecision"
      discriminator:
        propertyName: mode
        mapping:
          CHOICE: "#/components/schemas/ChoiceOnlyDecision"
          FREE_TEXT: "#/components/schemas/FreeTextOnlyDecision"
          EITHER: "#/components/schemas/EitherDecision"
    ChoiceOnlyDecision:
      type: object
      required: [mode, choice]
      properties:
        mode:
          type: string
          enum: [CHOICE]
        choice:
          $ref: "#/components/schemas/ChoiceConfig"
      description: Buttons only. No free-text input on this scene.
    FreeTextOnlyDecision:
      type: object
      required: [mode, free_text]
      properties:
        mode:
          type: string
          enum: [FREE_TEXT]
        free_text:
          $ref: "#/components/schemas/FreeTextConfig"
      description: Free-text only. No button options on this scene.
    EitherDecision:
      type: object
      required: [mode, choice, free_text]
      properties:
        mode:
          type: string
          enum: [EITHER]
        choice:
          $ref: "#/components/schemas/ChoiceConfig"
        free_text:
          $ref: "#/components/schemas/FreeTextConfig"
      description: Both surfaces exposed. The player picks one mode at runtime.
    Scene:
      type: object
      required: [scene_id, order, title, narrative, decision]
      properties:
        scene_id:
          type: string
          example: "S1_THE_VISION"
        order:
          type: integer
          minimum: 1
        title:
          type: string
        narrative:
          type: string
        decision:
          $ref: "#/components/schemas/SceneDecision"
        next_scene_id:
          type: string
          nullable: true
          description: Null on the last scene of the DLC.

    # ----- DLC -----
    DLCSummary:
      type: object
      required: [dlc_id, title, description, max_score]
      properties:
        dlc_id:
          type: string
          example: "sirius_must_live"
        title:
          type: string
          example: "Sirius Black Must Live"
        description:
          type: string
        max_score:
          type: integer
          example: 5
    ListDLCsResponse:
      type: object
      required: [dlcs]
      properties:
        dlcs:
          type: array
          items:
            $ref: "#/components/schemas/DLCSummary"

    # ----- Playthrough -----
    Playthrough:
      type: object
      required: [playthrough_id, player_uuid, dlc_id, total_score, status, started_at]
      properties:
        playthrough_id:
          type: string
          format: uuid
        player_uuid:
          type: string
          format: uuid
        dlc_id:
          type: string
        current_scene_id:
          type: string
          nullable: true
        total_score:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/PlaythroughStatus"
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        ending_id:
          allOf:
            - $ref: "#/components/schemas/EndingId"
          nullable: true
    StartPlaythroughRequest:
      type: object
      required: [player_uuid, dlc_id]
      properties:
        player_uuid:
          type: string
          format: uuid
        dlc_id:
          type: string
          example: "sirius_must_live"
    StartPlaythroughResponse:
      type: object
      required: [playthrough, scene]
      properties:
        playthrough:
          $ref: "#/components/schemas/Playthrough"
        scene:
          $ref: "#/components/schemas/Scene"
    GetSceneResponse:
      type: object
      required: [playthrough, scene]
      properties:
        playthrough:
          $ref: "#/components/schemas/Playthrough"
        scene:
          $ref: "#/components/schemas/Scene"

    # ----- Decision (discriminated union on `mode`) -----
    ChoiceDecisionRequest:
      type: object
      required: [scene_id, mode, choice_id]
      properties:
        scene_id:
          type: string
          example: "S1_THE_VISION"
        mode:
          type: string
          enum: [CHOICE]
        choice_id:
          type: string
          example: "B"
    FreeTextDecisionRequest:
      type: object
      required: [scene_id, mode, text]
      properties:
        scene_id:
          type: string
          example: "S4_THE_BRINK_OF_DEATH"
        mode:
          type: string
          enum: [FREE_TEXT]
        text:
          type: string
          minLength: 1
          example: "Cast Protego on Sirius and pull him back from the Veil."
    SubmitDecisionRequest:
      oneOf:
        - $ref: "#/components/schemas/ChoiceDecisionRequest"
        - $ref: "#/components/schemas/FreeTextDecisionRequest"
      discriminator:
        propertyName: mode
        mapping:
          CHOICE: "#/components/schemas/ChoiceDecisionRequest"
          FREE_TEXT: "#/components/schemas/FreeTextDecisionRequest"
    AIClassification:
      type: object
      required: [category_id, confidence]
      properties:
        category_id:
          type: string
          example: "SAFE_VERIFICATION"
        confidence:
          type: number
          minimum: 0
          maximum: 1
          example: 0.92
    SubmitDecisionResponse:
      type: object
      required: [is_correct, delta_score, total_score, narrative_feedback, playthrough_status]
      properties:
        is_correct:
          type: boolean
        delta_score:
          type: integer
          minimum: 0
          maximum: 1
        total_score:
          type: integer
        narrative_feedback:
          type: string
          description: LLM-generated, English. Always present.
        ai_classification:
          allOf:
            - $ref: "#/components/schemas/AIClassification"
          nullable: true
          description: Present only when the player used FREE_TEXT mode.
        next_scene:
          allOf:
            - $ref: "#/components/schemas/Scene"
          nullable: true
          description: Null when the playthrough has reached its ending.
        playthrough_status:
          $ref: "#/components/schemas/PlaythroughStatus"

    # ----- Ending -----
    DecisionLogEntry:
      type: object
      required: [scene_id, mode_used, is_correct, summary]
      properties:
        scene_id:
          type: string
        mode_used:
          $ref: "#/components/schemas/DecisionMode"
        is_correct:
          type: boolean
        summary:
          type: string
    GetEndingResponse:
      type: object
      required: [ending_id, title, narrative, summary, total_score, decisions_overview]
      properties:
        ending_id:
          $ref: "#/components/schemas/EndingId"
        title:
          type: string
        narrative:
          type: string
        summary:
          type: string
          description: LLM-generated personalized summary, English.
        total_score:
          type: integer
        decisions_overview:
          type: array
          items:
            $ref: "#/components/schemas/DecisionLogEntry"

    # ----- Hermione -----
    HermioneQueryRequest:
      type: object
      required: [player_uuid, query]
      properties:
        player_uuid:
          type: string
          format: uuid
        query:
          type: string
          minLength: 1
          maxLength: 300
          example: "What does the Veil do?"
        playthrough_id:
          type: string
          format: uuid
          nullable: true
    HermioneSource:
      type: object
      required: [lore_id, title]
      properties:
        lore_id:
          type: string
          example: "veil_001"
        title:
          type: string
          example: "The Veil in the Death Chamber"
    HermioneQueryResponse:
      type: object
      required: [answer, sources]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/HermioneSource"

    # ----- Error -----
    ErrorResponse:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          example: "PLAYTHROUGH_NOT_FOUND"
        message:
          type: string
        details:
          type: object
          nullable: true
